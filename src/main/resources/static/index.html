<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPO Support Desk - Admin Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Header and Logout styling */
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { margin: 0; color: #333; }
        .btn-logout { background-color: #dc3545; color: white; padding: 8px 15px; border: none; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 0.9em; cursor: pointer; }
        .btn-logout:hover { background-color: #bd2130; }

        .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-delete { background-color: #dc3545; color: white; padding: 5px 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">

    <div class="header-area">
        <h2>🎧 Support Ticket Dashboard</h2>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>

    <div style="display: flex; gap: 15px; margin-bottom: 20px; text-align: center;">
        <div style="flex: 1; background: #007bff; color: white; padding: 10px; border-radius: 8px;">
            <p style="margin: 0; font-size: 0.9em;">Total</p>
            <h2 id="totalCount" style="margin: 5px 0;">0</h2>
        </div>
        <div style="flex: 1; background: #dc3545; color: white; padding: 10px; border-radius: 8px;">
            <p style="margin: 0; font-size: 0.9em;">Open</p>
            <h2 id="openCount" style="margin: 5px 0;">0</h2>
        </div>
        <div style="flex: 1; background: #ffc107; color: black; padding: 10px; border-radius: 8px;">
            <p style="margin: 0; font-size: 0.9em;">Pending</p>
            <h2 id="pendingCount" style="margin: 5px 0;">0</h2>
        </div>
        <div style="flex: 1; background: #28a745; color: white; padding: 10px; border-radius: 8px;">
            <p style="margin: 0; font-size: 0.9em;">Solved</p>
            <h2 id="solvedCount" style="margin: 5px 0;">0</h2>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="issueInput" placeholder="Describe the issue here...">
        <button class="btn-save" onclick="createTicket()">Create Ticket</button>
    </div>

    <div style="margin-bottom: 15px;">
        <input type="text" id="searchInput" placeholder="Search issues (e.g. laptop, login)..."
               onkeyup="searchTickets()" style="width: 100%; border: 2px solid #007bff; border-radius: 5px; box-sizing: border-box;">
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Issue</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="ticketTableBody">
        </tbody>
    </table>
</div>

<script>
    // Ab hum same origin se run kar rahe hain, toh poora URL nahi chahiye
    const API_URL = "";

    function updateDashboardStats(tickets) {
        const total = tickets.length;
        const open = tickets.filter(t => {
            const s = t.status ? t.status.trim().toUpperCase() : "";
            return s === 'OPEN' || s === '';
        }).length;

        const pending = tickets.filter(t => t.status && t.status.trim().toUpperCase() === 'PENDING').length;
        const solved = tickets.filter(t => t.status && t.status.trim().toUpperCase() === 'SOLVED').length;

        document.getElementById('totalCount').innerText = total;
        document.getElementById('openCount').innerText = open;
        document.getElementById('pendingCount').innerText = pending;
        document.getElementById('solvedCount').innerText = solved;
    }

    // 1. Fetch all tickets
    async function fetchTickets() {
        try {
            const response = await fetch(API_URL + "/all-tickets");
            const tickets = await response.json();
            updateDashboardStats(tickets);
            const tableBody = document.getElementById('ticketTableBody');
            tableBody.innerHTML = "";

            tickets.forEach(function(ticket) {
                let bgColor = "white";
                let textColor = "black";

                if (ticket.status === 'SOLVED' || ticket.status === 'SUCCESFULLY RESOLVED') {
                    bgColor = "#d4edda";
                    textColor = "#155724";
                } else if (ticket.status === 'PENDING') {
                    bgColor = "#fff3cd";
                    textColor = "#856404";
                } else if (ticket.status === 'OPEN') {
                    bgColor = "#f8d7da";
                    textColor = "#721c24";
                }

                tableBody.innerHTML += `
                    <tr style="background-color: ${bgColor}; color: ${textColor}; transition: 0.3s;">
                        <td>${ticket.id}</td>
                        <td style="font-weight: 500;">${ticket.issue}</td>
                        <td>
                            <select id="status-${ticket.id}" onchange="changeStatus(${ticket.id}, '${ticket.issue}')" style="padding:5px; border-radius:4px; border:1px solid #ccc;">
                                <option value="OPEN" ${ticket.status === 'OPEN' ? 'selected' : ''}>OPEN</option>
                                <option value="PENDING" ${ticket.status === 'PENDING' ? 'selected' : ''}>PENDING</option>
                                <option value="SOLVED" ${ticket.status === 'SOLVED' ? 'selected' : ''}>SOLVED</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn-delete" onclick="deleteTicket(${ticket.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    // 2. Create a new ticket
    async function createTicket() {
        const issueInput = document.getElementById('issueInput');
        const issueValue = issueInput.value;

        if (!issueValue) {
            alert("Please enter an issue!");
            return;
        }

        const ticketData = {
            issue: issueValue,
            status: "OPEN"
        };

        try {
            const response = await fetch(API_URL + "/create-ticket", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(ticketData)
            });

            if (response.ok) {
                issueInput.value = "";
                fetchTickets();
            }
        } catch (error) {
            console.error("Error saving ticket:", error);
        }
    }

    // 3. Delete a ticket
    async function deleteTicket(id) {
        if (confirm("Are you sure you want to delete this?")) {
            try {
                await fetch(API_URL + "/delete-ticket/" + id, {
                    method: "DELETE"
                });
                fetchTickets();
            } catch (error) {
                console.error("Error deleting ticket:", error);
            }
        }
    }

    // 4. Change status via Dropdown
    async function changeStatus(id, issueText) {
        const newStatus = document.getElementById(`status-${id}`).value;

        const updatedData = {
            issue: issueText,
            status: newStatus
        };

        try {
            const response = await fetch(API_URL + "/update-ticket/" + id, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(updatedData)
            });

            if (response.ok) {
                fetchTickets(); // Status aur Stats card turant refresh ho jayenge
            }
        } catch (error) {
            console.error("Update failed:", error);
        }
    }

    // 5. Live Search
    async function searchTickets() {
        const keyword = document.getElementById('searchInput').value;

        if (!keyword) {
            fetchTickets();
            return;
        }

        try {
            const response = await fetch(API_URL + "/tickets/issue/" + keyword);
            const filteredTickets = await response.json();

            const tableBody = document.getElementById('ticketTableBody');
            tableBody.innerHTML = "";

            filteredTickets.forEach(ticket => {
                let bgColor = "white";
                if (ticket.status === 'SOLVED') bgColor = "#d4edda";
                else if (ticket.status === 'PENDING') bgColor = "#fff3cd";
                else if (ticket.status === 'OPEN') bgColor = "#f8d7da";

                tableBody.innerHTML += `
                <tr style="background-color: ${bgColor};">
                    <td>${ticket.id}</td>
                    <td>${ticket.issue}</td>
                    <td>
                        <select id="status-${ticket.id}" onchange="changeStatus(${ticket.id}, '${ticket.issue}')" style="padding:5px; border-radius:4px;">
                            <option value="OPEN" ${ticket.status === 'OPEN' ? 'selected' : ''}>OPEN</option>
                            <option value="PENDING" ${ticket.status === 'PENDING' ? 'selected' : ''}>PENDING</option>
                            <option value="SOLVED" ${ticket.status === 'SOLVED' ? 'selected' : ''}>SOLVED</option>
                        </select>
                    </td>
                    <td><button class="btn-delete" onclick="deleteTicket(${ticket.id})">Delete</button></td>
                </tr>
            `;
            });
        } catch (error) {
            console.error("Search failed:", error);
        }
    }

    // Page Load hote hi fetch karo
    fetchTickets();
</script>

</body>
</html>
